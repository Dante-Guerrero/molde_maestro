name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra dev python -m pytest -q

      - name: Verify tracked hygiene
        run: |
          violations="$(git ls-files | grep -E '(^|/)(\.DS_Store|__pycache__/|\.pytest_cache/|build/|dist/|.*\.egg-info/|__MACOSX/)' || true)"
          test -z "$violations"

      - name: Build package
        run: uv build

      - name: Install built wheel and smoke test CLI
        run: |
          python -m venv .ci-venv
          . .ci-venv/bin/activate
          pip install dist/*.whl
          molde-maestro --help
